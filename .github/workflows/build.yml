name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-windows:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node dependencies & build
        run: |
          npm install
          npx tsc

      - name: Download embedded Python
        run: |
          curl -L -o python-embed.zip https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip
          mkdir python
          tar -xf python-embed.zip -C python
          del python-embed.zip

          # Enable pip (uncomment "import site" in python312._pth)
          (Get-Content python\python312._pth) -replace '#import site', 'import site' | Set-Content python\python312._pth

          # Install pip
          curl -L -o get-pip.py https://bootstrap.pypa.io/get-pip.py
          python\python.exe get-pip.py --no-warn-script-location
          del get-pip.py

          # Install Python dependencies
          python\python.exe -m pip install --no-warn-script-location paddlepaddle paddleocr pdf2image textract olefile

      - name: Download Poppler (for pdf2image)
        run: |
          curl -L -o poppler.zip https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip
          mkdir poppler
          tar -xf poppler.zip -C poppler
          del poppler.zip
          # Flatten: poppler/Release-24.08.0-0/* -> poppler/
          $dir = Get-ChildItem poppler -Directory | Select-Object -First 1
          if ($dir) {
            Move-Item "$($dir.FullName)\*" poppler\
            Remove-Item $dir.FullName -Recurse -Force
          }

      - name: Package release
        run: |
          mkdir release\Moka-Local
          xcopy /E /I dist release\Moka-Local\dist
          xcopy /E /I node_modules release\Moka-Local\node_modules
          xcopy /E /I scripts release\Moka-Local\scripts
          xcopy /E /I public release\Moka-Local\public
          xcopy /E /I python release\Moka-Local\python
          xcopy /E /I poppler release\Moka-Local\poppler
          copy package.json release\Moka-Local\
          copy .env.example release\Moka-Local\
          copy install.bat release\Moka-Local\
          copy start.bat release\Moka-Local\
          powershell Compress-Archive -Path release\Moka-Local -DestinationPath Moka-Local-windows.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Moka-Local-windows.zip
