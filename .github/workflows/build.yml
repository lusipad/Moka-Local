name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-windows:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm install
          npx tsc
          pip install paddlepaddle paddleocr pdf2image

      - name: Package release
        run: |
          mkdir release\Moka-Local
          xcopy /E /I dist release\Moka-Local\dist
          xcopy /E /I node_modules release\Moka-Local\node_modules
          xcopy /E /I scripts release\Moka-Local\scripts
          xcopy /E /I public release\Moka-Local\public
          copy package.json release\Moka-Local\
          copy .env.example release\Moka-Local\
          copy install.bat release\Moka-Local\
          copy start.bat release\Moka-Local\
          powershell Compress-Archive -Path release\Moka-Local -DestinationPath Moka-Local-windows.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Moka-Local-windows.zip
